model:
  family: qwen2_5_vl
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  trust_remote_code: true
  local_files_only: false
  max_frames: 5

data:
  train_path: data/processed/medframeqa_answer_train.jsonl
  val_path: data/processed/medframeqa_answer_val.jsonl
  max_frames: 5

lora:
  target_strategy: decoder_qvo_last8_textonly
  r: 16
  alpha: 32
  dropout: 0.05

training:
  output_dir: results/direct_answer_qwen/adapter
  init_adapter_path: null
  num_train_epochs: 1.0
  learning_rate: 0.0002
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  gradient_checkpointing: true
  bf16: true
  fp16: false
